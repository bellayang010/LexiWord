name: LexiWord
options:
  bundleIdPrefix: com.lexiword
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    GENERATE_INFOPLIST_FILE: YES

targets:
  LexiWord:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LexiWord
        excludes:
          - "**/*.md"
          - "**/*.docx"
          - "**/*.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lexiword.LexiWord
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "LexiWord uses your camera to capture text for vocabulary learning."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  LexiWordTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LexiWordTests
    dependencies:
      - target: LexiWord
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lexiword.LexiWordTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/LexiWord.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LexiWord
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  LexiWord:
    build:
      targets:
        LexiWord: all
        LexiWordTests: [test]
    test:
      targets:
        - LexiWordTests
